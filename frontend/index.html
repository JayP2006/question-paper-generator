<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart Paper Generator</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.section{
    border:1px solid #ddd;
    padding:15px;
    margin-bottom:20px;
    border-radius:6px;
    background:#fafafa;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 16px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:10px;
    font-weight:bold;
}

.error{
    color:red;
}

.success{
    color:green;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

textarea{
    min-height:120px;
}

pre{
    background:#eee;
    padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Smart Question Paper Generator</h1>
<p>Backend must run on <b>http://localhost:5000</b></p>

<!-- SYLLABUS -->
<div class="section">

<h2>1. Upload Syllabus</h2>

<input id="subjectName" placeholder="Subject Name">

<input type="file" id="syllabusFile">

<button onclick="uploadSyllabus()">Upload Syllabus</button>

<div id="syllabusResult" class="result"></div>

</div>


<!-- PREVIOUS PAPERS -->
<div class="section">

<h2>2. Upload Previous Papers</h2>

<input type="file" id="paperFiles" multiple accept=".pdf">

<button onclick="uploadPapers()">Upload Papers</button>

<div id="paperResult" class="result"></div>

</div>


<!-- PROMPT -->
<div class="section">

<h2>3. Optional Teacher Prompt</h2>

<textarea id="prompt" placeholder="Example:
Generate GTU style exam.
Total Questions: 6
Marks pattern: 3,4,7
Add OR question in Q2 and Q4"></textarea>

</div>


<!-- GENERATE PAPER -->
<div class="section">

<h2>4. Generate Question Paper</h2>

<input id="blueprintId" placeholder="Blueprint ID">

<button onclick="generatePaper()">Generate Paper</button>

<div id="generateResult" class="result"></div>

</div>


<!-- DOWNLOAD -->
<div class="section">

<h2>5. Download Paper</h2>

<input id="paperId" placeholder="Generated Paper ID">

<button onclick="downloadPaper()">Download PDF</button>

</div>


<!-- VIEW DB QUESTIONS -->
<div class="section">

<h2>6. View Extracted Questions</h2>

<button onclick="fetchQuestions()">Fetch Questions</button>

<pre id="questionsOutput">No data yet...</pre>

</div>

</div>


<script>

const API_BASE="http://localhost:5000/api";

function showResult(id,text,isError=false){

const el=document.getElementById(id);

el.innerText=text;

el.className=isError?"result error":"result success";

}


async function safeFetch(url,options){

console.log("Calling API:",url);

const res=await fetch(url,options);

console.log("Response status:",res.status);

const text=await res.text();

console.log("Raw response:",text);

try{

return JSON.parse(text);

}

catch{

throw new Error("Server did not return JSON. Check backend route.");

}

}



/* UPLOAD SYLLABUS */

async function uploadSyllabus(){

const file=document.getElementById("syllabusFile").files[0];
const subject=document.getElementById("subjectName").value;

if(!file)return alert("Select syllabus file");

showResult("syllabusResult","Uploading...");

const formData=new FormData();
formData.append("file",file);
formData.append("subject",subject);

try{

const data=await safeFetch(`${API_BASE}/upload-syllabus`,{
method:"POST",
body:formData
});

showResult("syllabusResult","Topics: "+data.syllabus.topics.join(", "));

}

catch(err){

showResult("syllabusResult",err.message,true);

}

}



/* UPLOAD PAPERS */

async function uploadPapers(){

const files=document.getElementById("paperFiles").files;

if(files.length===0)return alert("Select PDF files");

showResult("paperResult","Uploading papers...");

const formData=new FormData();

for(let i=0;i<files.length;i++){
formData.append("files",files[i]);
}

try{

const data=await safeFetch(`${API_BASE}/upload-previous-papers`,{
method:"POST",
body:formData
});

showResult("paperResult",
`Extracted ${data.totalQuestionsAdded} questions. Blueprint ID: ${data.blueprintId}`
);

document.getElementById("blueprintId").value=data.blueprintId;

}

catch(err){

showResult("paperResult",err.message,true);

}

}



/* GENERATE PAPER */

async function generatePaper(){

const blueprintId=document.getElementById("blueprintId").value;
const prompt=document.getElementById("prompt").value;

if(!blueprintId)return alert("Enter blueprint ID");

showResult("generateResult","Generating paper...");

try{

const data=await safeFetch(`${API_BASE}/generate-paper`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
blueprintId:blueprintId,
prompt:prompt
})
});

console.log("Generate paper response:",data);

if(!data.paperId){
throw new Error("paperId missing in backend response");
}

showResult("generateResult","Paper generated ID: "+data.paperId);

document.getElementById("paperId").value=data.paperId;

}

catch(err){

showResult("generateResult",err.message,true);

}

}



/* DOWNLOAD PDF */

function downloadPaper(){

const id=document.getElementById("paperId").value;

if(!id)return alert("Enter paper ID");

window.open(`${API_BASE}/download-paper/${id}`,"_blank");

}



/* VIEW QUESTIONS */

async function fetchQuestions(){

const el=document.getElementById("questionsOutput");

el.innerText="Loading...";

try{

const data=await safeFetch(`${API_BASE}/questions`);

el.innerText=JSON.stringify(data,null,2);

}

catch(err){

el.innerText=err.message;

}

}

</script>

</body>
</html>
